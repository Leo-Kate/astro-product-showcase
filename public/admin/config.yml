backend:
  name: github
  repo: Leo-Kate/astro-product-showcase
  branch: main
  base_url: https://sveltia-cms-auth.linfengitt.workers.dev
  auth_methods:
    - oauth
    - token

site_url: https://mirck.co
display_url: https://mirck.co
logo_url: /favicon.svg

media_folder: public/images/uploads
public_folder: /images/uploads

slug:
  encoding: ascii
  clean_accents: true
  lowercase: true

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: src/content/products
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: "{{slug}}"
    preview_path: /products/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Brand
        name: brand
        widget: string
        required: true
      - label: SKU
        name: sku
        widget: string
        required: false
      - label: Category
        name: category
        widget: string
        required: false
      - label: Main image
        name: image
        widget: image
        required: true
      - label: Gallery images
        name: images
        widget: list
        required: false
        field:
          label: Image
          name: image
          widget: image
      - label: Price
        name: price
        widget: number
        value_type: float
        min: 0
        required: false
      - label: In stock
        name: in_stock
        widget: boolean
        default: true
        required: true
      - label: Excerpt
        name: excerpt
        widget: text
        required: false
      - label: Description
        name: body
        widget: markdown
        required: true
